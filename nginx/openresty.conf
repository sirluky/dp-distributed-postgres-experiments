worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 2s;

    lua_shared_dict load_metrics 10m;
    lua_shared_dict order_routing 20m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr upstream_status=$upstream_status '
                    'rt=$request_time urt=$upstream_response_time';

    access_log off;

    sendfile on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 10000;

    # limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2000r/s;
    # limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Inspired by production config: keep explicit routing context via maps.
    map $scheme $backend_scheme {
        default "http";
        https "https";
    }

    map $lb_selected_backend $selected_edge {
        default edge_nodes;
        edge1 edge1;
        edge2 edge2;
        edge3 edge3;
        core core_bench_node;
    }

    upstream edge_nodes {
        least_conn;
        server app_edge1:3000 max_fails=3 fail_timeout=30s;
        server app_edge2:3000 max_fails=3 fail_timeout=30s;
        server app_edge3:3000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream edge1 {
        server app_edge1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream edge2 {
        server app_edge2:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream edge3 {
        server app_edge3:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream core_node {
        server app_core:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream all_backends {
        server app_edge1:3000;
        server app_edge2:3000;
        server app_edge3:3000;
        server app_core:3000;
    }

    init_by_lua_block {
        local db_lb = {}

        local ROUTABLE_NODES = {
            { host = "app_edge1", port = 3000, name = "edge1" },
            { host = "app_edge2", port = 3000, name = "edge2" },
            { host = "app_edge3", port = 3000, name = "edge3" },
            { host = "app_core", port = 3000, name = "core" },
        }

        function db_lb.get_routable_nodes()
            return ROUTABLE_NODES
        end

        function db_lb.set_node_metric(node_name, count, healthy, error_msg)
            local metrics = ngx.shared.load_metrics
            local packed = tostring(tonumber(count) or 9999)
                .. "|" .. (healthy and "1" or "0")
                .. "|" .. tostring(ngx.time())
                .. "|" .. (error_msg or "")
            metrics:set("node:" .. node_name, packed, 30)
        end

        function db_lb.get_node_load()
            local results = {}
            local metrics = ngx.shared.load_metrics
            local now = ngx.time()

            for _, node in ipairs(ROUTABLE_NODES) do
                local packed = metrics:get("node:" .. node.name)

                if not packed then
                    results[node.name] = {
                        count = 10000,
                        healthy = false,
                        host = node.host,
                        port = node.port,
                        error = "missing load metrics",
                    }
                else
                    local c, h, ts, err = packed:match("^(%d+)|([01])|(%d+)|(.*)$")
                    c = tonumber(c)
                    ts = tonumber(ts)
                    local stale = (not ts) or ((now - ts) > 10)

                    if stale or not c then
                        results[node.name] = {
                            count = 10000,
                            healthy = false,
                            host = node.host,
                            port = node.port,
                            error = stale and "stale load metrics" or "missing load metrics",
                        }
                    else
                        results[node.name] = {
                            count = c,
                            healthy = h == "1",
                            host = node.host,
                            port = node.port,
                            error = (err ~= "") and err or nil,
                        }
                    end
                end
            end

            return results
        end

        -- Core-aware least-connections routing across edge1/edge2/edge3/core.
        -- Pouziva aktivni DB connections z /health/db-load endpointu aplikacnich uzlu.
        function db_lb.select_backend()
            local load = db_lb.get_node_load()
            local best_node = nil
            local best_count = math.huge

            for name, info in pairs(load) do
                if info.healthy and info.count < best_count then
                    best_count = info.count
                    best_node = name
                end
            end

            if not best_node then
                best_node = "edge1"
            end

            return best_node, load
        end

        local function route_by_order_id(order_id)
            if not order_id or order_id == "" then
                return nil, nil
            end

            local key = "order:" .. order_id
            local routing = ngx.shared.order_routing
            local existing = routing:get(key)

            if existing == "edge1" or existing == "edge2" or existing == "edge3" or existing == "core" then
                return existing, nil
            end

            local selected, load = db_lb.select_backend()
            -- 1 hour TTL is enough for benchmark/order lifecycle affinity.
            routing:set(key, selected, 3600)
            return selected, load
        end

        function db_lb.route_backend(order_id)
            local from_order, load = route_by_order_id(order_id)
            if from_order then
                return from_order, load
            end

            return db_lb.select_backend()
        end

        function db_lb.bind_order_backend(order_id, backend)
            if not order_id or order_id == "" then
                return
            end

            if backend ~= "edge1" and backend ~= "edge2" and backend ~= "edge3" and backend ~= "core" then
                return
            end

            local key = "order:" .. order_id
            ngx.shared.order_routing:set(key, backend, 3600)
        end

        function db_lb.status_json()
            local load = db_lb.get_node_load()
            local total_connections = 0
            local healthy_count = 0
            local first = true
            local json_parts = { '{"nodes":{' }

            for name, info in pairs(load) do
                if not first then
                    table.insert(json_parts, ",")
                end
                first = false

                table.insert(json_parts, string.format(
                    '"%s":{"count":%d,"healthy":%s,"host":"%s","port":%d}',
                    name,
                    info.count,
                    info.healthy and "true" or "false",
                    info.host,
                    info.port
                ))

                if info.healthy then
                    healthy_count = healthy_count + 1
                    total_connections = total_connections + info.count
                end
            end

            table.insert(json_parts, string.format(
                '},"total_connections":%d,"healthy_nodes":%d,"total_nodes":%d}',
                total_connections,
                healthy_count,
                #ROUTABLE_NODES
            ))

            return table.concat(json_parts)
        end

        package.loaded["db_load_balancer"] = db_lb
    }

    init_worker_by_lua_block {
        local cjson = require("cjson.safe")
        local db_lb = require("db_load_balancer")

        if ngx.worker.id() ~= 0 then
            return
        end

        local function fetch_node_load(node)
            local function mark_lb_failure(message)
                db_lb.set_node_metric(node.name, 10000, false, message)
            end

            local sock = ngx.socket.tcp()
            sock:settimeout(1000)

            local ok, err = sock:connect(node.host, node.port)
            if not ok then
                mark_lb_failure("connect failed: " .. (err or "unknown"))
                return
            end

            local req = "GET /health/db-load HTTP/1.1\r\n"
                .. "Host: " .. node.host .. "\r\n"
                .. "Connection: keep-alive\r\n\r\n"

            local sent, send_err = sock:send(req)
            if not sent then
                sock:close()
                mark_lb_failure("send failed: " .. (send_err or "unknown"))
                return
            end

            local read_headers, read_headers_err = sock:receiveuntil("\r\n\r\n")
            if not read_headers then
                sock:close()
                mark_lb_failure("header reader failed: " .. (read_headers_err or "unknown"))
                return
            end

            local header_blob, header_err = read_headers()
            if not header_blob then
                sock:close()
                mark_lb_failure("read headers failed: " .. (header_err or "unknown"))
                return
            end

            local status_code = tonumber(header_blob:match("^HTTP/%d%.%d%s+(%d+)%s"))
            if status_code ~= 200 then
                sock:close()
                mark_lb_failure("http status: " .. tostring(status_code or "n/a"))
                return
            end

            local content_length = tonumber(header_blob:match("[Cc]ontent%-[Ll]ength:%s*(%d+)"))
            if not content_length or content_length <= 0 then
                sock:close()
                mark_lb_failure("missing content-length for keepalive")
                return
            end

            local body, body_err = sock:receive(content_length)
            if not body then
                sock:close()
                mark_lb_failure("read body failed: " .. (body_err or "unknown"))
                return
            end

            if body == "" then
                sock:close()
                mark_lb_failure("missing response body")
                return
            end

            local payload = cjson.decode(body)
            if not payload then
                sock:close()
                mark_lb_failure("invalid json payload")
                return
            end

            local count = tonumber(payload.dbActiveConnections)
            if count == nil then
                sock:close()
                mark_lb_failure("missing dbActiveConnections")
                return
            end

            local is_db_healthy = count < 9999
            db_lb.set_node_metric(node.name, count, is_db_healthy, is_db_healthy and "" or "db unavailable")
            sock:setkeepalive(10000, 1)
        end

        local function refresh_all(premature)
            if premature then
                return
            end

            for _, node in ipairs(db_lb.get_routable_nodes()) do
                fetch_node_load(node)
            end
        end

        local ok_now, timer_now_err = ngx.timer.at(0.1, refresh_all)
        if not ok_now then
            ngx.log(ngx.ERR, "db_lb: failed to run initial load refresh: ", timer_now_err)
        end

        local ok, timer_err = ngx.timer.every(0.33, refresh_all)
        if not ok then
            ngx.log(ngx.ERR, "db_lb: failed to start periodic load refresh: ", timer_err)
        end
    }

    server {
        listen 80;
        server_name localhost;

        # limit_req zone=api_limit burst=4000 nodelay;
        # limit_conn conn_limit 2000;

        location = /health/db {
            default_type application/json;
            content_by_lua_block {
                local db_lb = require("db_load_balancer")
                ngx.say(db_lb.status_json())
            }
        }

        location = /health {
            set $lb_selected_backend '';
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local backend, load = db_lb.route_backend(nil)
                ngx.var.lb_selected_backend = backend
                ngx.shared.load_metrics:set("last_load", load)
            }

            proxy_pass http://$selected_edge/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
            proxy_set_header X-DB-Backend $lb_selected_backend;
        }

        location = /health/all {
            proxy_pass http://all_backends/health;
            proxy_http_version 1.1;
            proxy_connect_timeout 2s;
            proxy_read_timeout 5s;
        }

        location /merchants {
            proxy_pass http://core_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /analytics {
            proxy_pass http://core_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /settlements {
            proxy_pass http://core_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # orders/cart/webhooks are sticky by X-Order-Id and can land on edge or core-bench.
        location /orders {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.var.http_x_order_id
                local backend, _ = db_lb.route_backend(order_id)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
            proxy_set_header X-Order-Id $http_x_order_id;
        }

        location /webhooks {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.var.http_x_order_id
                local backend, _ = db_lb.route_backend(order_id)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
            proxy_set_header X-Order-Id $http_x_order_id;
        }

        location /cart {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.var.http_x_order_id
                local backend, _ = db_lb.route_backend(order_id)
                ngx.var.lb_selected_backend = backend
            }

            header_filter_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.header["X-Order-Id"] or ngx.header["x-order-id"]

                if type(order_id) == "table" then
                    order_id = order_id[1]
                end

                db_lb.bind_order_backend(order_id, ngx.var.lb_selected_backend)
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
            proxy_set_header X-Order-Id $http_x_order_id;
        }

        location /products {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local backend, _ = db_lb.route_backend(nil)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
        }

        # Keep order lifecycle stateful operations on the same edge node.
        location /inventory-quota {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.var.http_x_order_id
                local backend, _ = db_lb.route_backend(order_id)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
            proxy_set_header X-Order-Id $http_x_order_id;
        }

        # Normalize stock-requests root path to the slash variant.
        location = /stock-requests {
            return 307 /stock-requests/;
        }

        # Schválení / zamítnutí / stav žádosti — centralizované operace na core uzlu (H3).
        # Musí být PŘED prefixovým /stock-requests/ aby vzalo přednost.
        location ~ ^/stock-requests/[^/]+/(approve|reject)$ {
            proxy_pass http://core_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Keep stock request creation on the same edge as cart/product selection.
        location /stock-requests/ {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local order_id = ngx.var.http_x_order_id
                local backend, _ = db_lb.route_backend(order_id)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
            proxy_set_header X-Order-Id $http_x_order_id;
        }

        location /bench {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local backend, _ = db_lb.route_backend(nil)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
        }

        location / {
            access_by_lua_block {
                local db_lb = require("db_load_balancer")
                local backend, _ = db_lb.route_backend(nil)
                ngx.var.lb_selected_backend = backend
            }

            proxy_pass http://$selected_edge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_set_header X-DB-Backend $lb_selected_backend;
        }
    }
}
