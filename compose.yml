services:
  db_core:
    image: postgres:18
    cpus: "1.0"
    mem_limit: 4g
    cpuset: "0-1"
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - max_connections=1024
      - -c
      - max_wal_senders=10
      - -c
      - wal_keep_size=1GB
      - -c
      - max_replication_slots=20
    ports:
      - 35432:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_HOST_AUTH_METHOD=md5
    volumes:
      - ./migrations/00_init_core.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./migrations/01_enable_replication.sh:/docker-entrypoint-initdb.d/01_enable_replication.sh:ro
      - core_data:/var/lib/postgresql

  db_core_replica:
    image: postgres:18
    user: postgres
    cpus: "2.0"
    mem_limit: 2g
    cpuset: "8-9"
    ports:
      - 35436:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - PGUSER=admin
      - PGPASSWORD=admin
    volumes:
      - core_replica_data:/var/lib/postgresql
    command:
      - bash
      - -c
      - |
        # Wait for primary to be ready
        until pg_isready -h db_core -p 5432 -U admin; do
          echo "Waiting for primary..."
          sleep 2
        done

        # Data directory
        DATA_DIR="/var/lib/postgresql/data"

        # Check if data directory is empty (first run)
        if [ ! -s "$$DATA_DIR/PG_VERSION" ]; then
          echo "Initializing replica from primary..."
          rm -rf $$DATA_DIR/*
          mkdir -p $$DATA_DIR
          chmod 700 $$DATA_DIR
          pg_basebackup -h db_core -p 5432 -U admin -D $$DATA_DIR -Fp -Xs -P -R
          chmod 700 $$DATA_DIR
          
          # Update primary_conninfo to include dbname for slot sync (PG18 requirement)
          sed -i "s/primary_conninfo = '\\(.*\\)'/primary_conninfo = '\\1 dbname=postgres'/" $$DATA_DIR/postgresql.auto.conf
        fi

        # Start postgres in replica mode with PG17/18 slot sync support
        # - hot_standby=on: allow read queries on standby
        # - hot_standby_feedback=on: prevent vacuum from removing rows needed by standby
        # - primary_slot_name: use named slot for streaming (enables slot sync)
        # - sync_replication_slots=on: enable automatic slot synchronization (PG18)
        # - wal_level=logical: required for logical slot synchronization
        exec postgres \
          -c hot_standby=on \
          -c max_connections=1024 \
          -c hot_standby_feedback=on \
          -c primary_slot_name=replica_slot \
          -c sync_replication_slots=on \
          -c wal_level=logical \
          -c shared_preload_libraries=pg_stat_statements \
          -D $$DATA_DIR
    depends_on:
      - db_core

  db_edge1:
    image: postgres:18
    cpus: "1.0"
    mem_limit: 768m
    cpuset: "10-11"
    ports:
      - 35433:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - edge1_data:/var/lib/postgresql
      - ./migrations/00_init_edge1.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - shared_preload_libraries=pg_stat_statements

  # … stejna konfigurace pro edge2 a edge3


  db_edge2:
    image: postgres:18
    cpus: "1.0"
    mem_limit: 768m
    cpuset: "12-13"
    ports:
      - 35434:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - edge2_data:/var/lib/postgresql
      - ./migrations/00_init_edge2.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - shared_preload_libraries=pg_stat_statements

  db_edge3:
    image: postgres:18
    cpus: "1.0"
    mem_limit: 768m
    cpuset: "14-15"
    ports:
      - 35435:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - edge3_data:/var/lib/postgresql
      - ./migrations/00_init_edge3.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - shared_preload_libraries=pg_stat_statements

  migrator:
    build:
      context: ./migrator
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    volumes:
      - ./migrator/src:/app/src:ro
      - ./migrations:/app/migrations:ro
    depends_on:
      - db_core
      - db_edge1
      - db_edge2
      - db_edge3
    restart: "no"
