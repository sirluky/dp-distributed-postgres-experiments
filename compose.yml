  # =============================================================================
  # Application Services (Elysia API servers)
  # =============================================================================

  # Core API server - handles traffic like edge + core-specific operations (merchants, analytics, settlements)
  app_core:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ROLE=all
      - EDGE_ID=core
      - DB_HOST=db_core
      - DB_PORT=5432
      - DB_NAME=core_db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - PORT=3000
    ports:
      - "3001:3000"
    depends_on:
      - db_core
      - migrator
    restart: unless-stopped

  # Edge 1 API server - handles edge-specific operations (cart, orders, products)
  app_edge1:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ROLE=edge
      - EDGE_ID=edge1
      - DB_HOST=db_edge1
      - DB_PORT=5432
      - DB_NAME=edge1_db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - PORT=3000
    ports:
      - "3002:3000"
    depends_on:
      - db_edge1
      - migrator
    restart: unless-stopped

  # Edge 2 API server
  app_edge2:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ROLE=edge
      - EDGE_ID=edge2
      - DB_HOST=db_edge2
      - DB_PORT=5432
      - DB_NAME=edge2_db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - PORT=3000
    depends_on:
      - db_edge2
      - migrator
    restart: unless-stopped

  # Edge 3 API server
  app_edge3:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - NODE_ROLE=edge
      - EDGE_ID=edge3
      - DB_HOST=db_edge3
      - DB_PORT=5432
      - DB_NAME=edge3_db
      - DB_USER=admin
      - DB_PASSWORD=admin
      - PORT=3000
    depends_on:
      - db_edge3
      - migrator
    restart: unless-stopped

  # =============================================================================
  # Load Balancer (OpenResty)
  # =============================================================================

  # OpenResty load balancer with sticky sessions
  lb:
    image: openresty/openresty:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/openresty.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    depends_on:
      - app_core
      - app_edge1
      - app_edge2
      - app_edge3
    restart: unless-stopped

  # =============================================================================
  # K6 Benchmarking Service
  # =============================================================================

  # K6 load testing tool for performance benchmarks
  k6:
    image: grafana/k6:latest
    ports:
      - "5665:5665"
    volumes:
      - ./experiments/k6:/scripts:ro
      - ./experiments/k6/results:/results:rw
      - ./benchmark:/benchmark:ro
      - ./benchmark/results:/benchmark-results:rw
    environment:
      - K6_WEB_DASHBOARD=true
      - K6_WEB_DASHBOARD_EXPORT=/benchmark-results/k6-web-dashboard-report.html
      - K6_OUT_EXPERIMENTAL_PUSH=experimental-prometheus-rw
    depends_on:
      - lb
      - app_core
    restart: "no"

  # =============================================================================
  # Monitoring Stack (Prometheus + Grafana + PostgreSQL Exporters)
  # =============================================================================

  postgres_exporter_core:
    image: prometheuscommunity/postgres-exporter:latest
    volumes:
      - ./monitoring/postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    environment:
      - DATA_SOURCE_URI=db_core:5432/core_db?sslmode=disable
      - DATA_SOURCE_USER=admin
      - DATA_SOURCE_PASS=admin
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yaml
    depends_on:
      - db_core
    restart: unless-stopped

  # stejným způsobem postgres_exporter_edge1, edge2, edge3 s příslušnými DB hosty a názvy databází
  postgres_exporter_edge1:
    image: prometheuscommunity/postgres-exporter:latest
    volumes:
      - ./monitoring/postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    environment:
      - DATA_SOURCE_URI=db_edge1:5432/edge1_db?sslmode=disable
      - DATA_SOURCE_USER=admin
      - DATA_SOURCE_PASS=admin
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yaml
    depends_on:
      - db_edge1
    restart: unless-stopped

  postgres_exporter_edge2:
    image: prometheuscommunity/postgres-exporter:latest
    volumes:
      - ./monitoring/postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    environment:
      - DATA_SOURCE_URI=db_edge2:5432/edge2_db?sslmode=disable
      - DATA_SOURCE_USER=admin
      - DATA_SOURCE_PASS=admin
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yaml
    depends_on:
      - db_edge2
    restart: unless-stopped

  postgres_exporter_edge3:
    image: prometheuscommunity/postgres-exporter:latest
    volumes:
      - ./monitoring/postgres_exporter/queries.yaml:/etc/postgres_exporter/queries.yaml:ro
    environment:
      - DATA_SOURCE_URI=db_edge3:5432/edge3_db?sslmode=disable
      - DATA_SOURCE_USER=admin
      - DATA_SOURCE_PASS=admin
      - PG_EXPORTER_EXTEND_QUERY_PATH=/etc/postgres_exporter/queries.yaml
    depends_on:
      - db_edge3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - postgres_exporter_core
      - postgres_exporter_edge1
      - postgres_exporter_edge2
      - postgres_exporter_edge3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3010:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgadmin_data:
  cloudbeaver_data:
  core_data:
  core_replica_data:
  edge1_data:
  edge2_data:
  edge3_data:
  prometheus_data:
  grafana_data:
