global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: postgres_exporters
    static_configs:
      - targets:
          - postgres_exporter_core:9187
          - postgres_exporter_edge1:9187
          - postgres_exporter_edge2:9187
          - postgres_exporter_edge3:9187
